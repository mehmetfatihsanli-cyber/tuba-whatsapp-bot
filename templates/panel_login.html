<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Panel girişi – Tuba WhatsApp Bot</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; background: #f0f2f5; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 360px; width: 100%; }
        .card h1 { margin: 0 0 8px; font-size: 1.35rem; color: #333; }
        .card p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        label { display: block; font-weight: 500; color: #333; margin-bottom: 6px; font-size: 0.9rem; }
        select, input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; }
        button { width: 100%; padding: 12px; background: #128C7E; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; }
        button:hover { background: #0d6b60; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Panel girişi</h1>
        {% if skip_login_mode %}
        <p class="card-note" style="background:#e8f5e9;color:#2e7d32;padding:10px;border-radius:8px;font-size:0.9rem;margin-bottom:20px;">Şifre kapalı mod aktif. Panele girmek için aşağıdaki butona tıklayın.</p>
        <form method="post" action="/login" id="form">
            <input type="hidden" name="skip_login_confirm" value="1" />
            <button type="submit">Panele gir</button>
        </form>
        <p style="margin-top:16px;"><a href="/" style="color:#128C7E;font-size:0.9rem;">← Ana sayfaya dön</a></p>
        {% else %}
        <p>E-posta veya mağaza ile giriş yapın.</p>
        <div class="error" id="error">{% if error %}{{ error }}{% endif %}</div>
        <form method="post" action="/login" id="form">
            <label for="email">E-posta (kayıtlı mağaza)</label>
            <input type="email" name="email" id="email" placeholder="Kayıt olduğunuz e-posta" autocomplete="email" />
            <label for="tenant">Mağaza (Tuba / Zafer / Ali)</label>
            <select name="tenant" id="tenant">
                <option value="">Seçin</option>
                <option value="tuba">Tuba Butik</option>
                <option value="zafer">Zafer</option>
                <option value="ali">Ali</option>
            </select>
            <label for="password">Şifre</label>
            <input type="password" name="password" id="password" placeholder="Panel şifresi" required autocomplete="off" />
            <button type="submit">Giriş yap</button>
        </form>
        <p style="margin-top:10px;text-align:center;"><a href="{{ url_for('forgot_password_view') }}" style="color:#128C7E;font-size:0.9rem;">Şifremi Unuttum</a></p>
        <p style="margin-top:16px;text-align:center;">Hesabınız yok mu? <a href="/register" style="color:#128C7E;">Kayıt Olun</a></p>
        <p style="margin-top:6px;text-align:center;"><a href="/" style="color:#128C7E;font-size:0.9rem;">← Ana sayfaya dön</a></p>
        {% endif %}
    </div>
    <script>
        var form = document.getElementById('form');
        if (form) form.onsubmit = function() {
            var err = document.getElementById('error');
            if (err) err.style.display = 'none';
        };
        var err = document.getElementById('error');
        if (err && err.textContent.trim()) err.style.display = 'block';
    </script>
</body>
</html>
