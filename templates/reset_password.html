<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şifreyi Sıfırla – Tuba WhatsApp Bot</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; background: #f0f2f5; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 360px; width: 100%; }
        .card h1 { margin: 0 0 8px; font-size: 1.35rem; color: #333; }
        .card p { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        label { display: block; font-weight: 500; color: #333; margin-bottom: 6px; font-size: 0.9rem; }
        input[type="password"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; }
        button { width: 100%; padding: 12px; background: #128C7E; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; }
        button:hover { background: #0d6b60; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Yeni Şifre Belirleyin</h1>
        <p>Hesabınız için yeni bir şifre girin.</p>
        <div class="error" id="error">{% if error %}{{ error }}{% endif %}</div>
        <form method="post" action="{{ url_for('reset_password_view', token=token) }}" id="form">
            <label for="password">Yeni Şifre</label>
            <input type="password" name="password" id="password" placeholder="En az 6 karakter" minlength="6" required autocomplete="new-password" />
            <label for="password_confirm">Yeni Şifre (Tekrar)</label>
            <input type="password" name="password_confirm" id="password_confirm" placeholder="Şifreyi tekrar girin" minlength="6" required autocomplete="new-password" />
            <button type="submit">Şifreyi Güncelle</button>
        </form>
        <p style="margin-top:16px;text-align:center;"><a href="{{ url_for('login_view') }}" style="color:#128C7E;">← Giriş sayfasına dön</a></p>
    </div>
    <script>
        var form = document.getElementById('form');
        if (form) form.onsubmit = function() {
            var err = document.getElementById('error');
            if (err) err.style.display = 'none';
            var p1 = document.getElementById('password').value;
            var p2 = document.getElementById('password_confirm').value;
            if (p1 !== p2) {
                err = document.getElementById('error');
                if (err) { err.textContent = 'Şifreler eşleşmiyor.'; err.style.display = 'block'; }
                return false;
            }
        };
        var err = document.getElementById('error');
        if (err && err.textContent.trim()) err.style.display = 'block';
    </script>
</body>
</html>
