<div class="pipeline-card bg-white rounded-lg shadow-card border border-slate-200 p-3 cursor-grab active:cursor-grabbing hover:shadow-card-hover transition-shadow" data-customer-id="{{ c.id }}" data-status="{{ c.status or 'new' }}">
    <div class="flex items-start justify-between gap-2">
        <span class="font-medium text-slate-800 truncate" title="{{ c.phone }}">{{ c.display_phone }}</span>
        <a href="/dashboard/messages?hat={{ hat | default('satis') }}&phone={{ c.phone | urlencode }}" class="text-xs text-blue-600 hover:underline flex-shrink-0">Sohbet</a>
    </div>
    <p class="text-sm text-slate-600 mt-1 line-clamp-2 min-h-[2.5rem]" title="{{ c.last_message_body or '' }}">{{ c.last_message_body or '—' }}</p>
    <div class="flex items-center justify-between mt-2">
        <span class="text-xs text-slate-400">{{ c.time_ago }}</span>
        {% if c.tags and c.tags|length > 0 %}
        <span class="flex gap-1 flex-wrap">
            {% for tag in c.tags %}
            <span class="inline-block px-1.5 py-0.5 text-xs font-medium rounded bg-amber-100 text-amber-800">{{ tag }}</span>
            {% endfor %}
        </span>
        {% endif %}
    </div>
</div>
